name: DE Ingest

# Standalone data-ingestion workflow — deliberately separate from de-deploy.yml
# (dbt promotion) so ingestion and transformation run on independent schedules
# and can be triggered, retried, and reasoned about in isolation.

on:
  schedule:
    # - cron: '0 1 * * *'   # 1:00 AM UTC = 8:00 AM Bangkok time (ICT, UTC+7, no DST)
    - cron: '8 1,7,13,19 * * *'
  workflow_dispatch:        # manual run button

jobs:
  ingest:
    name: Ingest CoinGecko -> CRYPTO_DB.STG.COINGECKO_RAW
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r de-pipeline/ingestion/requirements.txt

      - name: Run ingestion (INGEST_MODE=snowflake)
        working-directory: de-pipeline/ingestion
        run: python ingest_coingecko.py
        env:
          INGEST_MODE:         snowflake
          # Reuse the DEVELOPER_SVC key pair (TYPE=SERVICE -> key-pair auth only).
          # Its usable role is SYSADMIN, which owns CRYPTO_DB.STG.
          SNOWFLAKE_ACCOUNT:     ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:        ${{ secrets.SNOWFLAKE_DEV_SVC_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_DEV_SVC_PRIVATE_KEY }}
          SNOWFLAKE_ROLE:        SYSADMIN
