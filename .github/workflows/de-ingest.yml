name: DE Ingest

# Standalone data-ingestion workflow — deliberately separate from the dbt
# workflows (dbt-run.yml / dbt-promote.yml) so ingestion and transformation run
# on independent schedules and can be triggered, retried, and reasoned about in
# isolation.
#
# Triggered by external cron (cron-job.org), NOT GitHub's built-in `schedule:`
# (delayed/dropped under load, and only fires from the default branch).
# cron-job.org POSTs to the GitHub REST API on schedule — set the time directly
# in Bangkok time there (e.g. 08:00 / 14:00 / 20:00 / 02:00 for a 6-hourly load):
#   POST https://api.github.com/repos/<owner>/coin-dwh-ml/actions/workflows/de-ingest.yml/dispatches
#   headers: Authorization: Bearer <PAT>, Accept: application/vnd.github+json,
#            X-GitHub-Api-Version: 2022-11-28 ; body {"ref":"main"}

on:
  workflow_dispatch:          # manual button + cron-job.org API dispatch target
  repository_dispatch:
    types: [de-ingest]        # alternative external-cron trigger

jobs:
  ingest:
    name: Ingest CoinGecko -> CRYPTO_DB.STG.COINGECKO_RAW
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r de-pipeline/ingestion/requirements.txt

      - name: Run ingestion (INGEST_MODE=snowflake)
        working-directory: de-pipeline/ingestion
        run: python ingest_coingecko.py
        env:
          INGEST_MODE:         snowflake
          # Reuse the DEVELOPER_SVC key pair (TYPE=SERVICE -> key-pair auth only).
          # Its usable role is SYSADMIN, which owns CRYPTO_DB.STG.
          SNOWFLAKE_ACCOUNT:     ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:        ${{ secrets.SNOWFLAKE_DEV_SVC_USER }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_DEV_SVC_PRIVATE_KEY }}
          SNOWFLAKE_ROLE:        SYSADMIN
