name: dbt promote (qa / prod)

# Promotes the dbt project to QA or PROD, where **the environment IS the branch**:
#   main_qa   -> builds QA_DB
#   main_prod -> builds PROD_DB
#
# This gives real isolation: a change pushed to `main` (dev) does NOT reach qa or
# prod. Each environment runs the code frozen on its own branch, and you promote
# only by merging forward:  main -> main_qa -> main_prod. The dbt `--target` is
# derived from the branch name, so the branch you run on fully decides the target
# database — there is no input that could point qa code at the prod database.
#
# Runs when:
#   * push to main_qa / main_prod touching de-pipeline/dbt/**  (a promotion merge), or
#   * external cron (cron-job.org) / manual dispatch on that branch.
#
# cron-job.org selects the environment purely by the branch in `ref`:
#   qa   -> body {"ref":"main_qa"}
#   prod -> body {"ref":"main_prod"}
# POST https://api.github.com/repos/<owner>/coin-dwh-ml/actions/workflows/dbt-promote.yml/dispatches
#   headers: Authorization: Bearer <PAT>, Accept: application/vnd.github+json,
#            X-GitHub-Api-Version: 2022-11-28
#
# NOTE: workflow_dispatch requires this file to exist on the **default branch**
# (main); GitHub then runs the copy that lives on whatever branch you dispatch.
# Keep the env branches current by merging main forward into them.
#
# Auth: DEVELOPER_SVC key-pair (matches profiles.yml), role SYSADMIN, which owns
# QA_DB and PROD_DB and reads the shared CRYPTO_DB.STG landing tables.

on:
  workflow_dispatch:            # manual (pick branch main_qa/main_prod) + cron-job.org target
  repository_dispatch:
    types: [dbt-promote]        # alternative external-cron trigger
  push:
    branches: [main_qa, main_prod]   # a promotion merge rebuilds that environment
    paths:
      - 'de-pipeline/dbt/**'

permissions:
  contents: read

env:
  SNOWFLAKE_ACCOUNT:          ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER:             ${{ secrets.SNOWFLAKE_DEV_SVC_USER }}   # DEVELOPER_SVC
  SNOWFLAKE_PRIVATE_KEY_PATH: ../.keys/rsa_key.p8   # relative to de-pipeline/dbt
  SNOWFLAKE_ROLE:             SYSADMIN

jobs:
  promote:
    name: dbt build (${{ github.ref_name }})
    runs-on: ubuntu-latest
    # GitHub Environment named after the branch (main_qa / main_prod) — add
    # Required Reviewers there for a second approval gate if you want one.
    environment: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-snowflake==1.7.0

      - name: Resolve dbt target from branch
        id: t
        # The branch is the single source of truth for which DB is built.
        run: |
          case "${{ github.ref_name }}" in
            main_qa)   echo "target=qa"   >> "$GITHUB_OUTPUT" ;;
            main_prod) echo "target=prod" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "::error::dbt-promote must run on 'main_qa' or 'main_prod' (got '${{ github.ref_name }}'). Dispatch with body {\"ref\":\"main_qa\"} or {\"ref\":\"main_prod\"}."
              exit 1 ;;
          esac

      - name: Write DEVELOPER_SVC private key
        env:
          PRIVATE_KEY: ${{ secrets.SNOWFLAKE_DEV_SVC_PRIVATE_KEY }}
        run: |
          mkdir -p de-pipeline/.keys
          printf '%s' "$PRIVATE_KEY" > de-pipeline/.keys/rsa_key.p8

      - name: dbt build (target ${{ steps.t.outputs.target }})
        working-directory: de-pipeline/dbt
        run: |
          dbt deps --profiles-dir .
          dbt build --target ${{ steps.t.outputs.target }} --profiles-dir .
