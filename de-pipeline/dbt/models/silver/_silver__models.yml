version: 2

models:
  - name: stg_coingecko_snapshot
    description: "Cleaned 6-hourly market snapshot, deduped to one row per coin per fetch."
    columns:
      - name: coin_id
        tests: [not_null]
      - name: fetched_at
        tests: [not_null]
      - name: price_usd
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: false
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [coin_id, fetched_at]

  - name: stg_coingecko_history
    description: "Cleaned daily historical series, one row per coin per day (latest backfill wins)."
    columns:
      - name: coin_id
        tests: [not_null]
      - name: price_date
        tests: [not_null]
      - name: price_usd
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: false
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [coin_id, price_date]

  - name: int_coin_daily
    description: >
      Unified daily grain per coin. Carries the day's average across its
      6-hourly extracts (avg_*) and the latest extract's values (latest_*),
      plus extract_count. Snapshot feed wins on overlap; history fills days with
      no snapshots (avg = latest, extract_count = 1).
    columns:
      - name: coin_id
        tests: [not_null]
      - name: price_date
        tests: [not_null]
      - name: extract_count
        tests: [not_null]
      - name: avg_price_usd
        tests: [not_null]
      - name: latest_price_usd
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [coin_id, price_date]
